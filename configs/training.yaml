sample_size: 0
split:
  validation_size: 0.15
  test_size: 0.15
models:
  - two_model_logistic
  - s_learner_logistic
  - t_learner_logistic
  - ft_transformer
transformer:
  d_token: 32
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 1024
  epochs: 6
  patience: 2